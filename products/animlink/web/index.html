<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>◈ AnimaLink · 灵元令网络</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ---- 拓扑页专属 ---- */
    .topo-canvas-wrap {
      position: relative;
      width: 100%;
      min-height: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 24px;
    }
    .topo-canvas-wrap canvas {
      display: block;
      width: 100%;
      height: 420px;
    }
    .topo-legend {
      position: absolute;
      bottom: 12px;
      left: 16px;
      display: flex;
      gap: 16px;
      font-size: 0.78rem;
      color: var(--text-dim);
    }
    .topo-legend span {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .legend-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .legend-dot.active  { background: var(--green);  box-shadow: 0 0 4px var(--green); }
    .legend-dot.offline { background: var(--gray); }
    .legend-dot.edge    { background: transparent; border: 1.5px dashed var(--accent); border-radius: 0; }

    /* 统计卡片 */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
    }
    .stat-card .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
    }
    .stat-card .stat-label {
      font-size: 0.82rem;
      color: var(--text-dim);
      margin-top: 4px;
    }
    .stat-card .stat-value.cyan { color: var(--cyan); }
    .stat-card .stat-value.green { color: var(--green); }

    /* 最新令牌 */
    .recent-tokens {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .recent-tokens h3 {
      font-size: 0.95rem;
      color: var(--text);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .recent-tokens .token-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }
    .recent-tokens .token-row:last-child { border-bottom: none; }
    .recent-tokens .token-id {
      font-weight: 600;
      color: var(--accent);
      min-width: 180px;
    }
    .recent-tokens .token-flow {
      color: var(--text-dim);
      flex: 1;
    }
    .recent-tokens .token-flow .arrow {
      color: var(--cyan);
      margin: 0 4px;
    }
  </style>
</head>
<body>

<!-- 导航栏 -->
<nav class="nav">
  <a class="nav-logo" href="index.html">
    <span class="logo-icon">◈</span>
    <span>AnimaLink</span>
  </a>
  <div class="nav-links">
    <a href="index.html" class="active">网络拓扑</a>
    <a href="nodes.html">节点</a>
    <a href="tokens.html">令牌</a>
  </div>
  <div class="nav-status">
    <span class="dot" id="navDot"></span>
    <span id="navStatusText">加载中…</span>
  </div>
</nav>

<!-- 主内容 -->
<main class="main">

  <div class="page-title">
    <span class="accent-bar"></span>
    灵元令网络 · 拓扑总览
  </div>

  <!-- 骨架屏 -->
  <div class="skeleton-wrap" id="skeleton">
    <div class="skeleton-pulse"></div>
    <div class="skeleton-text">正在获取网络数据…</div>
  </div>

  <!-- 拓扑图 -->
  <div class="topo-canvas-wrap hidden" id="topoWrap">
    <canvas id="topoCanvas"></canvas>
    <div class="topo-legend">
      <span><i class="legend-dot active"></i> 在线</span>
      <span><i class="legend-dot offline"></i> 离线</span>
      <span><i class="legend-dot edge"></i> 协作关系</span>
    </div>
  </div>

  <!-- 统计 -->
  <div class="stats-row hidden" id="statsRow">
    <div class="stat-card">
      <div class="stat-value" id="statNodes">—</div>
      <div class="stat-label">节点数</div>
    </div>
    <div class="stat-card">
      <div class="stat-value cyan" id="statTokens">—</div>
      <div class="stat-label">令牌总数</div>
    </div>
    <div class="stat-card">
      <div class="stat-value green" id="statHealth">—</div>
      <div class="stat-label">网络健康度</div>
    </div>
  </div>

  <!-- 最新令牌 -->
  <div class="recent-tokens hidden" id="recentWrap">
    <h3>◀ 最新令牌</h3>
    <div id="recentList"></div>
  </div>

</main>

<!-- 页脚 -->
<footer class="footer">
  <span>AnimaLink Viewer v0.1</span>
  <div class="live-indicator">
    <span class="dot"></span>
    <span>每 60s 自动刷新</span>
  </div>
</footer>

<script>
(function () {
  /* ---- 示例数据（API 未就绪时 fallback）---- */
  var sampleData = {
    timestamp: "2026-07-14T09:00:00+08:00",
    nodes: [
      { id: "nyx-windows", did: "did:stellar:f39115e529c73167467505115b803f44", label: "Nyx-Windows", platform: "windows-qclaw", status: "active", lastSeen: "2026-07-14T08:58:30+08:00", trust: 0.85, tokens: 3, completed: 3, canWriteNas: true },
      { id: "iris",        did: "did:key:z6Mksmum5T8CruP8Wfb5biQ8fsHNGqhBf1QFgqjq4JFVoQqr", label: "Iris",        platform: "lobsterai-openclaw", status: "active", lastSeen: "2026-07-13T18:08:01+08:00", trust: 0.85, tokens: 2, completed: 2, canWriteNas: true },
      { id: "kronos-heng", did: "did:key:z7QEhBj9FqPm2kXsRwL4nVdTgYcA6eUfO8iWoQpSrNmKdHx", label: "Kronos-恒",   platform: "qclaw", status: "active", lastSeen: "2026-07-13T14:15:58+08:00", trust: 0.85, tokens: 0, completed: 0, canWriteNas: true },
      { id: "kronos-shun", did: "did:key:pending", label: "Kronos-舜", platform: "pending", status: "offline", lastSeen: null, trust: 0.85, tokens: 0, completed: 0, canWriteNas: false },
      { id: "nyx-mac",     did: "did:stellar:pending", label: "Nyx-Mac", platform: "mac-qclaw", status: "active", lastSeen: "2026-07-13T16:05:00+08:00", trust: 0.85, tokens: 1, completed: 1, canWriteNas: false }
    ],
    edges: [
      { source: "nyx-windows", target: "iris",        label: "灵元令协作", tokens: 2 },
      { source: "nyx-windows", target: "kronos-heng", label: "灵元令协作", tokens: 1 },
      { source: "nyx-windows", target: "nyx-mac",     label: "灵元令协作", tokens: 1 },
      { source: "nyx-windows", target: "kronos-shun", label: "待建立",     tokens: 0 }
    ],
    tokens: [
      { id: "tk_anima_genesis_003", initiator: "nyx-windows", executor: "iris",        status: "completed", created: "2026-07-13T15:08:25+08:00", summary: "品牌官网 MVP 交付" },
      { id: "tk_anima_genesis_002", initiator: "nyx-windows", executor: "iris",        status: "completed", created: "2026-07-13T15:00:00+08:00", summary: "AnimaID 注册系统" },
      { id: "tk_animlink_backend",  initiator: "nyx-windows", executor: "kronos-heng", status: "pending",  created: "2026-07-14T09:00:00+08:00", summary: "AnimaLink 后端 API" },
      { id: "tk_animlink_frontend", initiator: "nyx-windows", executor: "iris",        status: "pending",  created: "2026-07-14T09:06:00+08:00", summary: "AnimaLink 前端 UI" }
    ]
  };

  /* ---- 获取数据 ---- */
  function fetchData() {
    return fetch("/animlink/api/network")
      .then(function (r) {
        if (!r.ok) throw new Error("API " + r.status);
        return r.json();
      })
      .catch(function () { return sampleData; });
  }

  /* ---- 渲染拓扑图 ---- */
  function drawTopo(data) {
    var canvas = document.getElementById("topoCanvas");
    var wrap = document.getElementById("topoWrap");
    var dpr = window.devicePixelRatio || 1;
    var w = wrap.clientWidth;
    var h = 420;
    canvas.width  = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width  = w + "px";
    canvas.style.height = h + "px";
    var ctx = canvas.getContext("2d");
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, w, h);

    var nodes = data.nodes || [];
    var edges = data.edges || [];

    /* 节点位置 — 星型布局 */
    var cx = w / 2, cy = h / 2;
    var activeNodes = nodes.filter(function (n) { return n.status === "active"; });
    var offlineNodes = nodes.filter(function (n) { return n.status !== "active"; });
    var positions = {};

    /* Nyx-Windows 居中 */
    positions["nyx-windows"] = { x: cx, y: cy - 40 };

    /* 其余在线节点环绕 */
    var angleStep = (2 * Math.PI) / Math.max(activeNodes.length - 1, 1);
    var radius = Math.min(w, h) * 0.32;
    var idx = 0;
    for (var i = 0; i < nodes.length; i++) {
      var n = nodes[i];
      if (n.id === "nyx-windows" || n.status !== "active") continue;
      var angle = -Math.PI / 2 + angleStep * idx;
      positions[n.id] = {
        x: cx + radius * Math.cos(angle),
        y: (cy - 40) + radius * Math.sin(angle)
      };
      idx++;
    }

    /* 离线节点放底部 */
    for (var j = 0; j < offlineNodes.length; j++) {
      positions[offlineNodes[j].id] = {
        x: cx + (j - (offlineNodes.length - 1) / 2) * 120,
        y: h - 50
      };
    }

    /* 画连线 */
    for (var e = 0; e < edges.length; e++) {
      var edge = edges[e];
      var s = positions[edge.source];
      var t = positions[edge.target];
      if (!s || !t) continue;
      ctx.beginPath();
      ctx.setLineDash([6, 4]);
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(t.x, t.y);
      ctx.strokeStyle = "rgba(58,143,255,0.35)";
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.setLineDash([]);

      /* 连线标签 */
      var mx = (s.x + t.x) / 2;
      var my = (s.y + t.y) / 2;
      ctx.font = "11px sans-serif";
      ctx.fillStyle = "rgba(136,153,181,0.7)";
      ctx.textAlign = "center";
      ctx.fillText(edge.label || "", mx, my - 6);
    }

    /* 画节点 */
    var nodeRadius = Math.min(36, Math.max(w, h) * 0.05);
    for (var k = 0; k < nodes.length; k++) {
      var node = nodes[k];
      var pos = positions[node.id];
      if (!pos) continue;
      var isActive = node.status === "active";

      /* 光晕 */
      if (isActive) {
        var glow = ctx.createRadialGradient(pos.x, pos.y, nodeRadius * 0.6, pos.x, pos.y, nodeRadius * 2);
        glow.addColorStop(0, "rgba(0,230,118,0.25)");
        glow.addColorStop(1, "rgba(0,230,118,0)");
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, nodeRadius * 2, 0, 2 * Math.PI);
        ctx.fillStyle = glow;
        ctx.fill();
      }

      /* 圆 */
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, nodeRadius, 0, 2 * Math.PI);
      ctx.fillStyle = isActive ? "#1a2332" : "#111827";
      ctx.fill();
      ctx.strokeStyle = isActive ? "#00e676" : "#6b7c99";
      ctx.lineWidth = 2.5;
      ctx.stroke();

      /* 名字 */
      ctx.font = "bold 12px \"PingFang SC\", \"Microsoft YaHei\", sans-serif";
      ctx.fillStyle = "#e2e8f0";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(node.label, pos.x, pos.y);

      /* 平台 */
      ctx.font = "10px sans-serif";
      ctx.fillStyle = "#8899b5";
      ctx.textBaseline = "top";
      ctx.fillText(node.platform, pos.x, pos.y + nodeRadius + 6);
    }
  }

  /* ---- 渲染统计 ---- */
  function renderStats(data) {
    var nodes = data.nodes || [];
    var tokens = data.tokens || [];
    var activeCount = nodes.filter(function (n) { return n.status === "active"; }).length;
    var totalTokens = tokens.length;
    var completedTokens = tokens.filter(function (t) { return t.status === "completed"; }).length;
    var health = totalTokens > 0 ? Math.round((completedTokens / totalTokens) * 100) : (activeCount === nodes.length ? 100 : Math.round((activeCount / nodes.length) * 100));

    document.getElementById("statNodes").textContent   = nodes.length + " (" + activeCount + " 在线)";
    document.getElementById("statTokens").textContent   = totalTokens;
    document.getElementById("statHealth").textContent   = health + "%";
  }

  /* ---- 渲染最新令牌 ---- */
  function renderRecent(data) {
    var tokens = (data.tokens || []).slice(-5).reverse();
    var list = document.getElementById("recentList");
    list.innerHTML = "";
    for (var i = 0; i < tokens.length; i++) {
      var t = tokens[i];
      var statusClass = t.status === "completed" ? "badge-completed" : "badge-pending";
      var row = document.createElement("div");
      row.className = "token-row";
      row.innerHTML =
        '<span class="token-id">' + t.id + '</span>' +
        '<span class="token-flow">' + t.initiator + ' <span class="arrow">→</span> ' + t.executor + '</span>' +
        '<span class="badge ' + statusClass + '">' + t.status + '</span>';
      list.appendChild(row);
    }
  }

  /* ---- 主流程 ---- */
  function render() {
    fetchData().then(function (data) {
      /* 骨架屏隐藏 */
      document.getElementById("skeleton").classList.add("hidden");
      document.getElementById("topoWrap").classList.remove("hidden");
      document.getElementById("statsRow").classList.remove("hidden");
      document.getElementById("recentWrap").classList.remove("hidden");

      /* 导航状态 */
      document.getElementById("navDot").classList.add("live");
      document.getElementById("navStatusText").textContent = "已连接 · " + (data.nodes || []).length + " 节点";

      drawTopo(data);
      renderStats(data);
      renderRecent(data);
    });
  }

  render();
  /* 每 60 秒刷新 */
  setInterval(render, 60000);
})();
</script>

</body>
</html>
