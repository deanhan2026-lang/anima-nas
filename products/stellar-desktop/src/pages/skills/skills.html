  <script>
    async function initPage() {
      document.body.style.opacity = '1';
      await loadSkills();
    }

    async function loadSkills() {
      try {
        const result = await window.stellarNyx.skillsList();
        if (result.success) {
          const grid = document.getElementById('skillsGrid');
          grid.innerHTML = result.skills.map(skill => `
            <div class="skill-card">
              <div class="header">
                <span class="icon">${skill.icon}</span>
                <div class="info">
                  <div class="name">${skill.name}</div>
                  <div class="desc">${skill.desc}</div>
                </div>
                <label class="toggle">
                  <input type="checkbox" ${skill.enabled ? 'checked' : ''} onchange="toggleSkill('${skill.id}', this.checked)">
                  <span class="slider"></span>
                </label>
              </div>
              <div class="usage">
                <code>${getUsage(skill.id)}</code>
              </div>
            </div>
          `).join('');
        }
      } catch (e) {
        document.getElementById('skillsGrid').innerHTML = '<p style="color:var(--red);">鍔犺浇澶辫触: ' + e.message + '</p>';
      }
    }

    function getUsage(skillId) {
      const usages = {
        code_exec: '鈿?杩愯 JavaScript 浠ｇ爜璇彞',
        web_search: '馃寪 鎼滅储 web 鍐呭',
        file_browse: '馃搨 娴忚鎸囧畾鐩綍缁撴瀯',
        terminal: '鈿欙笍 鎵ц Shell 鍛戒护',
        clipboard: '馃搵 璇诲彇/鍐欏叆鍓创鏉?
      };
      return usages[skillId] || '';
    }

    async function toggleSkill(skillId, enabled) {
      try {
        const result = await window.stellarNyx.skillsList();
        if (result.success) {
          const config = {};
          result.skills.forEach(s => { config[s.id] = s.id === skillId ? enabled : s.enabled; });
          await window.stellarNyx.skillsSaveConfig(config);
        }
      } catch (e) {
        console.error('淇濆瓨鎶€鑳介厤缃け璐?', e.message);
      }
    }

    initPage();
  </script>
