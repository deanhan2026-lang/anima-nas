  <link rel="stylesheet" href="../../styles/main.css">
  <style>
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      transition: border-color var(--transition);
    }
    .stat-card:hover { border-color: var(--border-light); }

    .stat-card .stat-icon { font-size: 1.4rem; margin-bottom: 8px; }
    .stat-card .stat-label {
      font-size: 0.78rem;
      color: var(--text-dim);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .stat-card .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
    }
    .stat-card .stat-sub {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .stat-card.full-width {
      grid-column: 1 / -1;
    }

    .trust-ring {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .trust-ring .ring {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 6px solid var(--card2);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .trust-ring .ring .ring-fill {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 6px solid transparent;
      border-top-color: var(--green);
      border-right-color: var(--green);
    }
    .trust-ring .ring .ring-value {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--green);
    }
    .trust-ring .ring-detail {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .trust-ring .ring-detail .td-label {
      font-size: 0.82rem;
      color: var(--text-dim);
    }
    .trust-ring .ring-detail .td-value {
      font-size: 0.9rem;
      color: var(--text);
      font-weight: 600;
    }

    .did-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
    }
    .did-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .did-panel-header h3 {
      font-size: 1rem;
      color: var(--text);
    }

    .log-panel {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      max-height: 320px;
      overflow-y: auto;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.78rem;
      line-height: 1.8;
    }
    .log-entry {
      display: flex;
      gap: 8px;
      padding: 2px 0;
    }
    .log-entry .log-time { color: var(--text-muted); flex-shrink: 0; }
    .log-entry .log-level { font-weight: 600; flex-shrink: 0; width: 48px; }
    .log-level.info { color: var(--accent); }
    .log-level.success { color: var(--green); }
    .log-level.warn { color: var(--yellow); }
    .log-level.error { color: var(--red); }
    .log-entry .log-msg { color: var(--text-dim); }

    .quick-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .node-detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .node-detail-item {
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .node-detail-item .nd-label {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 2px;
    }
    .node-detail-item .nd-value {
      font-size: 0.88rem;
      color: var(--text);
      word-break: break-all;
    }
  </style>
</head>

  <script src="../../shared/theme.js"></script>

  <script src="../../shared/state.js"></script>
  <script>
    let refreshInterval = null;

    async function refreshAll() {
      await StellarState.init();
      updateDashboard();
      renderLogs();
    }

    function updateDashboard() {
      // Status stats
      document.getElementById('nodeStatus').textContent = 
        StellarState.identityRegistered ? '娲昏穬' : '鏈敞鍐?;
      document.getElementById('nodeStatus').style.color = 
        StellarState.identityRegistered ? 'var(--green)' : 'var(--yellow)';
      document.getElementById('nodeSubStatus').textContent = 
        StellarState.identityRegistered ? `鑺傜偣ID: ${StellarState.nodeId || '-'}` : '璇峰畬鎴愯缃?;

      document.getElementById('didStatus').textContent = 
        StellarState.didGenerated ? '鉁?宸茬敓鎴? : '鉂?鏈敓鎴?;
      document.getElementById('didSubStatus').textContent = 
        StellarState.did ? StellarState.did.substring(0, 16) + '...' : '-';

      document.getElementById('carbonStatus').textContent = 
        StellarState.carbonBound ? '鉁?宸茬粦瀹? : '鈴?璺宠繃';
      document.getElementById('carbonSubStatus').textContent = 
        StellarState.carbonBound ? '淇′换鍒?+0.5' : '淇′换鍒?0.0';

      document.getElementById('personaStatus').textContent = 
        StellarState.personaLoaded ? '鉁?宸插姞杞? : '鉂?鏈姞杞?;
      document.getElementById('personaSubStatus').textContent = 
        StellarState.personaName || '-';

      // Trust score
      const baseTrust = 0.0;
      const carbonTrust = StellarState.carbonBound ? 0.5 : 0.0;
      const collabTrust = 0.0; // For future use
      const onlineTrust = 0.0; // For future use
      const totalTrust = Math.min(baseTrust + carbonTrust + collabTrust + onlineTrust, 1.0);

      document.getElementById('trustValue').textContent = totalTrust.toFixed(2);
      document.getElementById('baseTrust').textContent = baseTrust.toFixed(1);
      document.getElementById('carbonTrust').textContent = carbonTrust.toFixed(1);
      document.getElementById('collabTrust').textContent = collabTrust.toFixed(1);
      document.getElementById('onlineTrust').textContent = onlineTrust.toFixed(1);

      // Trust ring fill (conic gradient)
      const fillDegree = totalTrust * 180; // Max 180 deg in ring
      document.getElementById('trustRingFill').style.cssText = 
        `border-top-color: var(--green); border-right-color: var(--green);`;

      // Guardian level badge
      const badge = document.getElementById('guardianLevelBadge');
      if (StellarState.carbonBound) {
        badge.className = 'badge badge-completed';
        badge.textContent = 'owner';
      } else {
        badge.className = 'badge badge-offline';
        badge.textContent = '鏃犳媴淇?;
      }

      // Node details
      document.getElementById('ndNodeId').textContent = StellarState.nodeId || '-';
      document.getElementById('ndDid').textContent = StellarState.did || '-';
      document.getElementById('ndRegisteredAt').textContent = 
        StellarState.registeredAt 
          ? new Date(StellarState.registeredAt).toLocaleString('zh-CN')
          : StellarState.didCreated
            ? new Date(StellarState.didCreated).toLocaleString('zh-CN')
            : '-';
      document.getElementById('ndPubkey').textContent = StellarState.publicKeyHex || '-';

      // Active badge
      const activeBadge = document.getElementById('activeBadge');
      if (StellarState.identityRegistered) {
        activeBadge.className = 'badge badge-active';
        activeBadge.textContent = '鉁?宸叉敞鍐?;
      } else if (StellarState.didGenerated) {
        activeBadge.className = 'badge badge-pending';
        activeBadge.textContent = '寰呮敞鍐?;
      } else {
        activeBadge.className = 'badge badge-offline';
        activeBadge.textContent = '鏈缃?;
      }

      // Nav status
      document.getElementById('statusDot').className = 
        StellarState.identityRegistered ? 'dot live' : 'dot';
      document.getElementById('statusText').textContent = 
        StellarState.identityRegistered ? '鍦ㄧ嚎' : '绂荤嚎';
    }

    function renderLogs() {
      const panel = document.getElementById('logPanel');
      const logs = StellarState._logs;

      if (logs.length === 0) {
        panel.innerHTML = `
          <div class="log-entry">
            <span class="log-time">--:--:--</span>
            <span class="log-level info">INFO</span>
            <span class="log-msg">鏃犳搷浣滆褰?/span>
          </div>
        `;
        return;
      }

      panel.innerHTML = logs.map(entry => `
        <div class="log-entry">
          <span class="log-time">${entry.time}</span>
          <span class="log-level ${entry.level}">${entry.level.toUpperCase()}</span>
          <span class="log-msg">${entry.message}</span>
        </div>
      `).join('');

      // Auto-scroll to bottom
      panel.scrollTop = panel.scrollHeight;
    }

    function copyNodeInfo() {
      const info = {
        app: 'STELLAR NYX 2.0',
        did: StellarState.did || '-',
        nodeId: StellarState.nodeId || '-',
        publicKeyHex: StellarState.publicKeyHex || '-',
        carbonBound: StellarState.carbonBound,
        trustSeed: StellarState.trustSeed || 0,
        personaLoaded: StellarState.personaLoaded,
        personaName: StellarState.personaName || '-',
        platform: navigator.platform
      };

      const text = JSON.stringify(info, null, 2);
      navigator.clipboard.writeText(text).then(() => {
        StellarState.log('success', '鑺傜偣淇℃伅宸插鍒跺埌鍓创鏉?);
        renderLogs();
      }).catch(() => {
        StellarState.log('warn', '澶嶅埗澶辫触锛堝壀璐存澘鏉冮檺锛?);
        renderLogs();
      });
    }

    function openAnimaLink() {
      window.stellarNyx.openExternal('http://127.0.0.1:5050/');
    }

    async function resetAndRestart() {
      if (!confirm('纭畾瑕侀噸缃墍鏈夎缃紝閲嶆柊寮€濮嬪悧锛焅n锛圖ID 绉侀挜鏂囦欢灏嗕繚鐣欏湪 .anima 鐩綍涓級')) {
        return;
      }
      StellarState.reset();
      
      // Add a reset log
      StellarState.log('info', '鐢ㄦ埛璇锋眰閲嶆柊璁剧疆锛屾鍦ㄨ烦杞埌娆㈣繋椤?..');
      renderLogs();

      setTimeout(() => {
        StellarNav.navigate('welcome');
      }, 1000);
    }

    async function initPage() {
      document.body.style.opacity = '1';
      await StellarState.init();
      updateDashboard();
      renderLogs();

      // Add initial logs
      if (StellarState._logs.length === 0) {
        StellarState.log('info', 'STELLAR NYX 鎺у埗鍙板凡鍔犺浇');
        if (StellarState.identityRegistered) {
          StellarState.log('success', `鑺傜偣宸叉敞鍐? ${StellarState.nodeId}`);
        }
        renderLogs();
      }

      // Set up auto-refresh (every 30s)
      refreshInterval = setInterval(refreshAll, 30000);
    }

    // Clean up interval on page leave
    window.addEventListener('beforeunload', () => {
      if (refreshInterval) clearInterval(refreshInterval);
    });

    initPage();
  </script>
